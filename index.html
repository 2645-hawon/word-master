<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2026 단어왕 선발대회 Trainer (150 Words)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f5f7fa; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #4a90e2; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-test { background: #4a90e2; color: white; }
        .btn-choice { background: #2ecc71; color: white; } /* 객관식 버튼 */
        .btn-wrong { background: #e67e22; color: white; }
        .btn-reset { background: #95a5a6; color: white; }
        .btn-mix { background: #9b59b6; color: white; }
        
        #test-area { display: none; margin-top: 20px; padding: 30px; border: 3px solid #4a90e2; border-radius: 12px; text-align: center; background: #fff; }
        #question-info { color: #7f8c8d; font-size: 0.9em; margin-bottom: 10px; }
        #question-text { font-size: 2.2em; margin: 20px 0; color: #2c3e50; font-weight: bold; line-height: 1.4; }
        
        /* 주관식 입력 */
        #input-mode { margin-bottom: 15px; }
        input[type="text"] { width: 80%; padding: 12px; font-size: 1.2em; border: 2px solid #ddd; border-radius: 8px; outline-color: #4a90e2; }
        
        /* 객관식 보기 */
        #choice-mode { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .choice-btn { padding: 15px; background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px; font-size: 1.1em; cursor: pointer; transition: 0.2s; }
        .choice-btn:hover { background: #e9ecef; border-color: #4a90e2; }

        .word-item { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .is-incorrect { background-color: #fff5f5; color: #e74c3c; }
        .badge { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }
        .config-area { text-align: center; margin-bottom: 20px; padding: 15px; background: #edf2f7; border-radius: 10px; }
        .config-area input { width: 60px; padding: 5px; border-radius: 5px; border: 1px solid #cbd5e0; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 단어왕 Trainer</h1>

    <div class="config-area">
        <span>문제 개수 설정: </span>
        <input type="number" id="testCount" value="40" min="1" max="150"> 개
    </div>
    
    <div class="btn-group">
        <button class="btn-test" onclick="startTest('toEng', 'input')">뜻 → 영어(쓰기)</button>
        <button class="btn-test" onclick="startTest('toKor', 'input')">영어 → 뜻(쓰기)</button>
        <button class="btn-choice" onclick="startTest('toKor', 'choice')">객관식 (영→뜻)</button>
        <button class="btn-mix" onclick="startTest('mix', 'input')">랜덤 혼합 주관식</button>
        <button class="btn-wrong" onclick="startTest('toEng', 'input', true)">오답 주관식</button>
        <button class="btn-reset" onclick="resetIncorrect()">오답 초기화</button>
    </div>

    <div id="test-area">
        <div id="question-info"></div>
        <div id="question-text"></div>
        
        <div id="input-mode">
            <input type="text" id="answerInput" placeholder="정답 입력 후 Enter" onkeypress="if(event.keyCode==13) checkAnswer()">
            <br><br>
            <button class="btn-test" onclick="checkAnswer()">제출</button>
        </div>

        <div id="choice-mode" style="display:none;"></div>
    </div>

    <div class="word-list">
        <h3>단어 목록 (<span id="word-count">0</span>)</h3>
        <div id="list-container"></div>
    </div>
</div>

<script>
    const defaultWords = [
        {word: "a wide array of", mean: "다양한"}, {word: "account for", mean: "차지하다"}, {word: "acknowledge", mean: "수령을 알리다"},
        {word: "acquire", mean: "인수하다"}, {word: "adhere to", mean: "~을 준수하다"}, {word: "compliance", mean: "준수"},
        {word: "comply with", mean: "~을 준수하다"}, {word: "adversely", mean: "부정적으로"}, {word: "advocate", mean: "지지하다"},
        {word: "affordable", mean: "가격이 적당한"}, {word: "aggregate", mean: "합계의"}, {word: "alleviate", mean: "완화하다"},
        {word: "mitigate", mean: "완화시키다"}, {word: "ambiguous", mean: "모호한"}, {word: "ample", mean: "충분한"},
        {word: "as of late", mean: "최근에"}, {word: "assess", mean: "평가하다"}, {word: "attest to", mean: "~을 증명하다"},
        {word: "attribute", mean: "~의 덕분으로 돌리다"}, {word: "auspicious", mean: "유망한"}, {word: "prospective", mean: "유망한"},
        {word: "be consistent with", mean: "~와 일치하다"}, {word: "coincide", mean: "일치하다"}, {word: "be entitled to", mean: "~할 자격이 있다"},
        {word: "eligible", mean: "자격이 있는"}, {word: "be liable for", mean: "~에 대해 책임이 있다"}, {word: "belated", mean: "뒤늦은"},
        {word: "briefly", mean: "잠시"}, {word: "broaden", mean: "넓히다"}, {word: "circumvent", mean: "우회하다"},
        {word: "coherent", mean: "일관성 있는"}, {word: "commence", mean: "시작되다"}, {word: "commitment to", mean: "~에 대한 헌신"},
        {word: "dedicate", mean: "헌신하다"}, {word: "confidential", mean: "기밀의"}, {word: "conducive", mean: "도움이 되는"},
        {word: "contingency plan", mean: "비상 대책"}, {word: "contrary to", mean: "~와는 반대로"}, {word: "curtail", mean: "축소하다"},
        {word: "delegate", mean: "위임하다"}, {word: "deplete", mean: "고갈시키다"}, {word: "designated", mean: "지정된"},
        {word: "deterrent", mean: "억제책"}, {word: "detrimental", mean: "해로운"}, {word: "devote A to B", mean: "A를 B에 쏟다"},
        {word: "discretion", mean: "재량"}, {word: "discretionary", mean: "자유 재량의"}, {word: "discrepancy", mean: "불일치"},
        {word: "draw a conclusion", mean: "결론을 도출하다"}, {word: "efficiently", mean: "효율적으로"}, {word: "eliminate", mean: "제거하다"},
        {word: "encompass", mean: "포함하다"}, {word: "endorse", mean: "승인하다"}, {word: "erroneous", mean: "잘못된"},
        {word: "excursion", mean: "짧은 여행"}, {word: "exquisite", mean: "정교한"}, {word: "facilitate", mean: "용이하게 하다"},
        {word: "familiarize with", mean: "~에 익숙해지다"}, {word: "favorable", mean: "호의적인"}, {word: "feasibility", mean: "실연 가능성"},
        {word: "fluctuate", mean: "변동하다"}, {word: "formidable", mean: "위협적인"}, {word: "fragile", mean: "깨지기 쉬운"},
        {word: "galvanize", mean: "활력을 불어넣다"}, {word: "genuine", mean: "진짜의"}, {word: "go into effect", mean: "효력을 발생하다"},
        {word: "halt", mean: "중단하다"}, {word: "haphazard", mean: "무계획적인"}, {word: "heed", mean: "주의를 기울이다"},
        {word: "hinder", mean: "방해하다"}, {word: "hospitality", mean: "환대"}, {word: "impeccable", mean: "결점 없는"},
        {word: "imperative", mean: "필수적인"}, {word: "vital", mean: "필수적인"}, {word: "impending", mean: "임박한"},
        {word: "imply", mean: "암시하다"}, {word: "in accordance with", mean: "~에 부합하여"}, {word: "in conjunction with", mean: "~와 협력하여"},
        {word: "in light of", mean: "~을 고려하여"}, {word: "under consideration", mean: "고려 중인"}, {word: "in the event of", mean: "~의 경우에"},
        {word: "incentive", mean: "장려책"}, {word: "incur", mean: "발생시키다"}, {word: "inherent", mean: "내재된"},
        {word: "itinerary", mean: "여행 일정표"}, {word: "jointly", mean: "공동으로"}, {word: "judicious", mean: "현명한"},
        {word: "keen", mean: "열망하는"}, {word: "keep in mind", mean: "명심하다"}, {word: "keep track of", mean: "~을 파악하다"},
        {word: "keep up with", mean: "~을 따라잡다"}, {word: "legible", mean: "읽기 쉬운"}, {word: "leverage", mean: "활용하다"},
        {word: "take advantage of", mean: "~을 활용하다"}, {word: "utilize", mean: "활용하다"}, {word: "liaise", mean: "연락하다"},
        {word: "lucid", mean: "명료한"}, {word: "lucrative", mean: "수익성이 좋은"}, {word: "mandatory", mean: "의무적인"},
        {word: "manifest", mean: "나타내다"}, {word: "moderate", mean: "적당한"}, {word: "modification", mean: "수정"},
        {word: "noteworthy", mean: "주목할 만한"}, {word: "notify", mean: "통지하다"}, {word: "obsolete", mean: "구식의"},
        {word: "on behalf of", mean: "~을 대신하여"}, {word: "on short notice", mean: "갑작스럽게"}, {word: "optimize", mean: "최적화하다"},
        {word: "overhaul", mean: "점검하다"}, {word: "oversee", mean: "감독하다"}, {word: "pave", mean: "(길을) 닦다"},
        {word: "pending", mean: "미결의"}, {word: "perpetual", mean: "영구적인"}, {word: "point of contact", mean: "연락 담당자"},
        {word: "precarious", mean: "불안정한"}, {word: "precaution", mean: "예방 조치"}, {word: "preliminary", mean: "예비의"},
        {word: "prerequisite", mean: "전제 조건"}, {word: "prior to", mean: "~보다 앞서"}, {word: "promptly", mean: "즉시"},
        {word: "prosperous", mean: "번영하는"}, {word: "provisional estimate", mean: "임시 견적"}, {word: "reimburse", mean: "환급하다"},
        {word: "refrain from", mean: "~을 자제하다"}, {word: "reluctant", mean: "꺼리는"}, {word: "resilient", mean: "회복력 있는"},
        {word: "retrieve", mean: "검색하다"}, {word: "scrupulous", mean: "꼼꼼한"}, {word: "scrutinize", mean: "면밀히 조사하다"},
        {word: "stagnant", mean: "정체된"}, {word: "stem from", mean: "~에서 기인하다"}, {word: "stipulate", mean: "규정하다"},
        {word: "stringent", mean: "엄격한"}, {word: "sturdy", mean: "튼튼한"}, {word: "subsequent", mean: "차후의"},
        {word: "take precedence", mean: "우선권을 갖다"}, {word: "tedious", mean: "지루한"}, {word: "temporarily", mean: "일시적으로"},
        {word: "tentatively", mean: "잠정적으로"}, {word: "terminate", mean: "종료하다"}, {word: "unanimous", mean: "만장일치의"},
        {word: "unprecedented", mean: "전례 없는"}, {word: "unravel", mean: "해결하다"}, {word: "validity", mean: "유효성"},
        {word: "verify", mean: "확인하다"}, {word: "versatile", mean: "다재다능한"}, {word: "vigilant", mean: "경계하는"},
        {word: "volatile", mean: "변동이 심한"}, {word: "withstand", mean: "견디다"}, {word: "yield", mean: "산출하다"}
    ];

    let words = defaultWords;
    let wrongToEng = JSON.parse(localStorage.getItem('wrong_voca_eng')) || [];
    let wrongToKor = JSON.parse(localStorage.getItem('wrong_voca_kor')) || [];
    let testQueue = [], currentIndex = 0, quizMethod = 'input';
    let correctCount = 0;

    function renderList() {
        const container = document.getElementById('list-container');
        document.getElementById('word-count').innerText = words.length;
        container.innerHTML = words.map((w, i) => {
            const isWrong = wrongToEng.includes(i) || wrongToKor.includes(i);
            return `<div class="word-item ${isWrong ? 'is-incorrect' : ''}">
                <span><strong>${i+1}. ${w.word}</strong> : ${w.mean}</span>
                ${isWrong ? '<span class="badge">오답기록</span>' : ''}
            </div>`;
        }).join('');
    }

    function startTest(type, method, onlyWrong) {
        let indices = onlyWrong 
            ? [...new Set([...wrongToEng, ...wrongToKor])]
            : words.map((_, i) => i);
            
        if (indices.length === 0) return alert("시험볼 단어가 없습니다!");
        
        const limit = parseInt(document.getElementById('testCount').value) || indices.length;
        let selected = indices.sort(() => Math.random() - 0.5).slice(0, limit);
        
        quizMethod = method;
        testQueue = selected.map(id => {
            let finalType = type === 'mix' ? (Math.random() > 0.5 ? 'toEng' : 'toKor') : type;
            return {...words[id], originalId: id, questionType: finalType};
        });

        currentIndex = 0; correctCount = 0;
        document.getElementById('test-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = testQueue[currentIndex];
        document.getElementById('question-info').innerText = `문제 ${currentIndex + 1} / ${testQueue.length}`;
        document.getElementById('question-text').innerText = (q.questionType === 'toEng') ? q.mean : q.word;

        if (quizMethod === 'input') {
            document.getElementById('input-mode').style.display = 'block';
            document.getElementById('choice-mode').style.display = 'none';
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').focus();
        } else {
            document.getElementById('input-mode').style.display = 'none';
            document.getElementById('choice-mode').style.display = 'grid';
            generateChoices(q);
        }
    }

    function generateChoices(correctWord) {
        const container = document.getElementById('choice-mode');
        let choices = [correctWord.mean];
        while (choices.length < 4) {
            let randomMean = words[Math.floor(Math.random() * words.length)].mean;
            if (!choices.includes(randomMean)) choices.push(randomMean);
        }
        choices.sort(() => Math.random() - 0.5);
        container.innerHTML = choices.map(c => 
            `<button class="choice-btn" onclick="checkChoiceAnswer('${c}')">${c}</button>`
        ).join('');
    }

    function checkChoiceAnswer(selected) {
        const q = testQueue[currentIndex];
        if (selected === q.mean) {
            alert("정답입니다! ✨");
            correctCount++;
            wrongToKor = wrongToKor.filter(id => id !== q.originalId);
        } else {
            alert(`오답입니다! ❌\n정답: ${q.mean}`);
            if (!wrongToKor.includes(q.originalId)) wrongToKor.push(q.originalId);
        }
        saveAndNext();
    }

    function checkAnswer() {
        const q = testQueue[currentIndex];
        const input = document.getElementById('answerInput').value.trim().toLowerCase();
        let isCorrect = false;

        if (q.questionType === 'toEng') {
            isCorrect = (input === q.word.toLowerCase());
            if (isCorrect) wrongToEng = wrongToEng.filter(id => id !== q.originalId);
            else if (!wrongToEng.includes(q.originalId)) wrongToEng.push(q.originalId);
        } else {
            const correctMeans = q.mean.split(/[,/]/).map(s => s.trim());
            isCorrect = correctMeans.some(m => input === m || input === m.replace(/\s/g, ''));
            if (isCorrect) wrongToKor = wrongToKor.filter(id => id !== q.originalId);
            else if (!wrongToKor.includes(q.originalId)) wrongToKor.push(q.originalId);
        }

        if (isCorrect) { alert("정답입니다! ✨"); correctCount++; }
        else { alert(`오답입니다! ❌\n정답: ${q.questionType === 'toEng' ? q.word : q.mean}`); }
        saveAndNext();
    }

    function saveAndNext() {
        localStorage.setItem('wrong_voca_eng', JSON.stringify(wrongToEng));
        localStorage.setItem('wrong_voca_kor', JSON.stringify(wrongToKor));
        currentIndex++;
        if (currentIndex < testQueue.length) showQuestion();
        else {
            const score = Math.round((correctCount / testQueue.length) * 100);
            alert(`시험 종료!\n🎯 점수: ${score}점 (${correctCount}/${testQueue.length})`);
            document.getElementById('test-area').style.display = 'none';
            renderList();
        }
    }

    function resetIncorrect() {
        if(confirm("오답 기록을 초기화할까요?")) {
            wrongToEng = []; wrongToKor = [];
            localStorage.setItem('wrong_voca_eng', '[]');
            localStorage.setItem('wrong_voca_kor', '[]');
            renderList();
        }
    }

    renderList();
</script>
</body>
</html>
