<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Voca Trainer Pro - 150 Master</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background: #f5f7fa; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .config-area { text-align: center; margin-bottom: 20px; padding: 15px; background: #edf2f7; border-radius: 10px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-test { background: #4a90e2; color: white; }
        .btn-ex { background: #2ecc71; color: white; }
        .btn-wrong { background: #e67e22; color: white; }
        .btn-reset { background: #95a5a6; color: white; }
        
        #test-area { display: none; margin-top: 20px; padding: 30px; border: 3px solid #4a90e2; border-radius: 12px; text-align: center; background: #fff; }
        #question-text { font-size: 1.6em; margin: 20px 0; color: #2c3e50; font-weight: bold; line-height: 1.5; }
        #question-trans { color: #636e72; font-size: 1em; margin-bottom: 20px; background: #f1f2f6; padding: 10px; border-radius: 5px; min-height: 20px; }
        
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .option-btn { padding: 15px; background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 10px; cursor: pointer; font-size: 1.05em; text-align: left; }
        .option-btn:hover { background: #edf2f7; border-color: #4a90e2; }
        
        input[type="text"] { width: 80%; padding: 12px; font-size: 1.2em; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .word-list { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .word-item { padding: 8px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; font-size: 0.9em; }
        .is-incorrect { background-color: #fff5f5; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 2026 단어왕 150제</h1>
    <div class="config-area">
        <span>테스트 문제 수: </span>
        <input type="number" id="testCount" value="20" style="width:60px;">
    </div>
    
    <div class="btn-group">
        <button class="btn-test" onclick="startTest('toEng', false)">뜻 → 영어</button>
        <button class="btn-test" onclick="startTest('toKor', false)">영어 → 뜻</button>
        <button class="btn-ex" onclick="startTest('example', false)">예문 빈칸 (주관식)</button>
        <button class="btn-wrong" onclick="startTest('toEng', true)">오답 연습 (영)</button>
        <button class="btn-reset" onclick="resetIncorrect()">오답 초기화</button>
    </div>

    <div id="test-area">
        <div id="question-info" style="color:#7f8c8d; font-size:0.9em;"></div>
        <div id="question-text"></div>
        <div id="question-trans"></div>
        <div id="options-area" class="options-container"></div>
        <div id="subjective-area" style="display:none;">
            <input type="text" id="answerInput" placeholder="정답 입력" onkeypress="if(event.keyCode==13) checkSubjectiveAnswer()">
            <button class="btn-test" onclick="checkSubjectiveAnswer()">제출</button>
        </div>
    </div>

    <div class="word-list">
        <h3>단어 목록 (<span id="count-display">0</span>)</h3>
        <div id="list-container"></div>
    </div>
</div>

        {word: "retrieve", mean: "검색하다", ex: "Easy to (               ) lost password.", trans: "비밀번호를 검색하는 것은 쉽습니다."},
        {word: "scrupulous", mean: "꼼꼼한", ex: "Accountant is (               ) about records.", trans: "회계사는 기록 유지에 매우 꼼꼼합니다."},
        {word: "scrutinize", mean: "면밀히 조사하다", ex: "Experts will (               ) the data.", trans: "전문가들은 데이터를 면밀히 조사할 것입니다."},
        {word: "stagnant", mean: "정체된", ex: "Sales remained (               ) for 3 months.", trans: "매출이 3개월 동안 정체된 상태입니다."},
        {word: "stem from", mean: "~에서 기인하다", ex: "Problems (               ) old hardware.", trans: "문제는 오래된 하드웨어에서 기인합니다."},
        {word: "stipulate", mean: "규정하다", ex: "Contract will (               ) delivery date.", trans: "계약서는 인도 날짜를 규정할 것입니다."},
        {word: "stringent", mean: "엄격한", ex: "Follow (               ) safety regulations.", trans: "엄격한 안전 규정을 따라야 합니다."},
        {word: "sturdy", mean: "튼튼한", ex: "Protected by a (               ) casing.", trans: "튼튼한 외장으로 보호됩니다."},
        {word: "subsequent", mean: "차후의", ex: "(               ) events proved initial plan.", trans: "이후의 사건들이 초기 계획을 증명했습니다."},
        {word: "take precedence", mean: "우선권을 갖다", ex: "Quality should (               ) over speed.", trans: "품질 관리가 속도보다 우선시되어야 합니다."},
        {word: "tedious", mean: "지루한", ex: "Data entry can be a (               ) task.", trans: "데이터 입력은 지루한 작업이 될 수 있습니다."},
        {word: "temporarily", mean: "일시적으로", ex: "Website will be (               ) unavailable.", trans: "웹사이트를 일시적으로 이용할 수 없습니다."},
        {word: "tentatively", mean: "잠정적으로", ex: "Next meeting is (               ) scheduled.", trans: "다음 회의는 잠정적으로 예정되어 있습니다."},
        {word: "terminate", mean: "종료하다", ex: "Decided to (               ) the contract early.", trans: "계약을 조기 종료하기로 결정했습니다."},
        {word: "unanimous", mean: "만장일치의", ex: "Reached a (               ) decision.", trans: "만장일치로 결정을 내렸습니다."},
        {word: "unprecedented", mean: "전례 없는", ex: "Saw (               ) growth in sales.", trans: "매출에서 전례 없는 성장을 기록했습니다."},
        {word: "unravel", mean: "해결하다", ex: "Work hard to (               ) the issue.", trans: "문제를 해결하기 위해 열심히 일했습니다."},
        {word: "validity", mean: "유효성", ex: "Confirm the (               ) of license.", trans: "면허가 만료되기 전에 유효성을 확인해 주십시오."},
        {word: "verify", mean: "확인하다", ex: "System will (               ) your identity.", trans: "시스템이 귀하의 신원을 확인합니다."},
        {word: "versatile", mean: "다재다능한", ex: "This (               ) tool has many tasks.", trans: "이 다재다능한 도구는 쓰임새가 많습니다."},
        {word: "vigilant", mean: "경계하는", ex: "Remain (               ) against security threats.", trans: "보안 위협에 대해 항상 경계해야 합니다."},
        {word: "volatile", mean: "변동이 심한", ex: "Stock market has been very (               ).", trans: "주식 시장의 변동성이 매우 심했습니다."},
        {word: "withstand", mean: "견디다", ex: "Designed to (               ) strong winds.", trans: "강풍을 견딜 수 있도록 설계되었습니다."},
        {word: "yield", mean: "산출하다", ex: "Strategy is starting to (               ) results.", trans: "전략이 결과를 산출하기 시작했습니다."},
        // 이미지 단어 추가
        {word: "vague", mean: "애매한, 희미한", ex: "His answer was (               ).", trans: "그의 대답은 애매했습니다."},
        {word: "perfectionist", mean: "완완벽주의자", ex: "He is a total (               ).", trans: "그는 철저한 완벽주의자입니다."},
        {word: "indifferent", mean: "무관심한", ex: "She is (               ) to politics.", trans: "그녀는 정치에 무관심합니다."},
        {word: "productivity", mean: "생산성", ex: "Aiming for higher (               ).", trans: "더 높은 생산성을 목표로 합니다."},
        {word: "assignment", mean: "과제", ex: "Finish your (               ) by Friday.", trans: "금요일까지 과제를 끝내세요."},
        {word: "gradually", mean: "점진적으로", ex: "The situation improved (               ).", trans: "상황이 점진적으로 개선되었습니다."}
    ];

    let wrongToEng = JSON.parse(localStorage.getItem('voca_wrong')) || [];
    let testQueue = [], currentIndex = 0, currentMode = '', correctCount = 0;

    function renderList() {
        document.getElementById('count-display').innerText = words.length;
        const container = document.getElementById('list-container');
        container.innerHTML = words.map((w, i) => `
            <div class="word-item ${wrongToEng.includes(i) ? 'is-incorrect' : ''}">
                <span>${i+1}. <b>${w.word}</b> : ${w.mean}</span>
            </div>
        `).join('');
    }

    function getSynonyms(word) {
        for (let group of synonymGroups) {
            if (group.includes(word)) return group;
        }
        return [word];
    }

    function startTest(mode, onlyWrong) {
        currentMode = mode;
        let pool = onlyWrong ? wrongToEng : words.map((_, i) => i);
        if (pool.length === 0) return alert("기록이 없습니다.");

        let count = parseInt(document.getElementById('testCount').value) || 20;
        let selected = pool.sort(() => Math.random() - 0.5).slice(0, count);
        
        testQueue = selected.map(id => ({...words[id], originalId: id}));
        currentIndex = 0; correctCount = 0;
        document.getElementById('test-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = testQueue[currentIndex];
        document.getElementById('question-info').innerText = `${currentIndex + 1} / ${testQueue.length}`;
        document.getElementById('question-trans').innerText = q.trans;
        
        const optArea = document.getElementById('options-area');
        const subArea = document.getElementById('subjective-area');

        if (currentMode === 'example') {
            optArea.style.display = 'none'; subArea.style.display = 'block';
            document.getElementById('question-text').innerText = q.ex;
            document.getElementById('answerInput').value = ''; document.getElementById('answerInput').focus();
        } else {
            optArea.style.display = 'grid'; subArea.style.display = 'none';
            document.getElementById('question-text').innerText = (currentMode === 'toEng') ? q.mean : q.word;
            makeOptions(q);
        }
    }

    function makeOptions(correct) {
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        
        // 유의어 그룹을 찾아 선지에서 배제
        const exclusions = getSynonyms(correct.word);
        
        let distractors = words
            .filter(w => !exclusions.includes(w.word))
            .sort(() => Math.random() - 0.5)
            .slice(0, 3);
            
        let final = [...distractors, correct].sort(() => Math.random() - 0.5);
        final.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = (currentMode === 'toEng') ? opt.word : opt.mean;
            btn.onclick = () => handleResult(opt.word === correct.word);
            area.appendChild(btn);
        });
    }

    function handleResult(isCorrect) {
        const q = testQueue[currentIndex];
        if (isCorrect) {
            correctCount++;
            wrongToEng = wrongToEng.filter(id => id !== q.originalId);
        } else {
            alert(`틀렸습니다! 정답: ${q.word} (${q.mean})`);
            if(!wrongToEng.includes(q.originalId)) wrongToEng.push(q.originalId);
        }
        localStorage.setItem('voca_wrong', JSON.stringify(wrongToEng));
        next();
    }

    function checkSubjectiveAnswer() {
        const input = document.getElementById('answerInput').value.trim().toLowerCase();
        handleResult(input === testQueue[currentIndex].word.toLowerCase());
    }

    function next() {
        currentIndex++;
        if (currentIndex < testQueue.length) showQuestion();
        else {
            alert(`완료! 점수: ${correctCount}/${testQueue.length}`);
            document.getElementById('test-area').style.display = 'none';
            renderList();
        }
    }

    function resetIncorrect() {
        if(confirm("초기화하시겠습니까?")) {
            wrongToEng = []; localStorage.removeItem('voca_wrong'); renderList();
        }
    }

    renderList();
</script>
