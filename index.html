let queue = [], curIdx = 0, score = 0, testMode = '';

function start(m) {
    testMode = m;
    let count = document.getElementById('qCount').value;
    queue = [...data].sort(() => Math.random() - 0.5).slice(0, count);
    curIdx = 0; score = 0;
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('test-view').style.display = 'block';
    render();
}

function render() {
    const q = queue[curIdx];
    document.getElementById('progress-text').innerText = `${curIdx + 1} / ${queue.length}`;
    const optArea = document.getElementById('options-area');
    const inputArea = document.getElementById('input-box');
    
    if (testMode === 'ex') {
        document.getElementById('question-text').innerText = q.ex;
        optArea.style.display = 'none';
        inputArea.style.display = 'block';
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').focus();
    } else {
        document.getElementById('question-text').innerText = (testMode === 'toEng') ? q.m : q.w;
        optArea.style.display = 'grid';
        inputArea.style.display = 'none';
        makeOptions(q);
    }
}

function makeOptions(correct) {
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    
    let forbidden = [correct.w];
    for (let group of synonyms) {
        if (group.includes(correct.w)) {
            forbidden = group; break;
        }
    }

    let distractors = data.filter(item => !forbidden.includes(item.w)).sort(() => Math.random() - 0.5).slice(0, 3);
    let final = [...distractors, correct].sort(() => Math.random() - 0.5);

    final.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = (testMode === 'toEng') ? opt.w : opt.m;
        btn.onclick = () => check(opt === correct);
        area.appendChild(btn);
    });
}

function check(isCorrect) {
    const q = queue[curIdx];
    if (isCorrect) {
        score++;
    } else {
        alert(`❌ 틀렸습니다!\n정답: ${q.w} (${q.m})`);
    }
    
    curIdx++;
    if (curIdx < queue.length) render();
    else {
        alert(`🎉 종료!\n최종 점수: ${score} / ${queue.length}`);
        location.reload();
    }
}

function checkSub() {
    const input = document.getElementById('answer-input').value.trim().toLowerCase();
    const correct = queue[curIdx].w.toLowerCase();
    check(input === correct);
}
