<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>2026 단어왕 선발대회 Trainer (150 Words)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f5f7fa; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #4a90e2; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-test { background: #4a90e2; color: white; }
        .btn-choice { background: #2ecc71; color: white; } /* 객관식 버튼 */
        .btn-wrong { background: #e67e22; color: white; }
        .btn-reset { background: #95a5a6; color: white; }
        .btn-mix { background: #9b59b6; color: white; }
        
        #test-area { display: none; margin-top: 20px; padding: 30px; border: 3px solid #4a90e2; border-radius: 12px; text-align: center; background: #fff; }
        #question-info { color: #7f8c8d; font-size: 0.9em; margin-bottom: 10px; }
        #question-text { font-size: 1.6em; margin: 20px 0; color: #2c3e50; font-weight: bold; line-height: 1.6; word-break: keep-all; }
        #question-translation { font-size: 1.1em; color: #7f8c8d; margin-bottom: 20px; }
        
        /* 주관식 입력 */
        #input-mode { margin-bottom: 15px; }
        input[type="text"] { width: 80%; padding: 12px; font-size: 1.2em; border: 2px solid #ddd; border-radius: 8px; outline-color: #4a90e2; }
        
        /* 객관식 보기 */
        #choice-mode { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .choice-btn { padding: 15px; background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px; font-size: 1.1em; cursor: pointer; transition: 0.2s; }
        .choice-btn:hover { background: #e9ecef; border-color: #4a90e2; }

        .word-item { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .is-incorrect { background-color: #fff5f5; color: #e74c3c; }
        .badge { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }
        .config-area { text-align: center; margin-bottom: 20px; padding: 15px; background: #edf2f7; border-radius: 10px; }
        .config-area input { width: 60px; padding: 5px; border-radius: 5px; border: 1px solid #cbd5e0; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 단어왕 Trainer</h1>

    <div class="config-area">
        <span>문제 개수 설정: </span>
        <input type="number" id="testCount" value="40" min="1" max="150"> 개
    </div>
    
    <div class="btn-group">
        <button class="btn-test" onclick="startTest('toEng', 'input')">뜻 → 영어(쓰기)</button>
        <button class="btn-test" onclick="startTest('toKor', 'input')">영어 → 뜻(쓰기)</button>
        <button class="btn-choice" onclick="startTest('toEng', 'choice')">객관식 (예문 빈칸)</button>
        <button class="btn-mix" onclick="startTest('mix', 'input')">랜덤 혼합 주관식</button>
        <button class="btn-wrong" onclick="startTest('toEng', 'input', true)">오답 주관식</button>
        <button class="btn-reset" onclick="resetIncorrect()">오답 초기화</button>
    </div>

    <div id="test-area">
        <div id="question-info"></div>
        <div id="question-text"></div>
        <div id="question-translation"></div>
        
        <div id="input-mode">
            <input type="text" id="answerInput" placeholder="정답 입력 후 Enter" onkeypress="if(event.keyCode==13) checkAnswer()">
            <br><br>
            <button class="btn-test" onclick="checkAnswer()">제출</button>
        </div>

        <div id="choice-mode" style="display:none;"></div>
    </div>

    <div class="word-list">
        <h3>단어 목록 (<span id="word-count">0</span>)</h3>
        <div id="list-container"></div>
    </div>
</div>

<script>
    const defaultWords = [
        {word: "a wide array of", mean: "다양한", ex: "The store offers a wide array of electronic accessories for laptops.", trans: "그 상점은 노트북을 위한 다양한 전자 액세서리를 제공합니다."},
        {word: "account for", mean: "차지하다", ex: "Overseas sales account for more than half of the company's total profit.", trans: "해외 매출이 회사 전체 이익의 절반 이상을 차지합니다."},
        {word: "acknowledge", mean: "수령을 알리다", ex: "Please acknowledge receipt of the package by signing the delivery form.", trans: "배송 양식에 서명하여 물품 수령을 확인해 주시기 바랍니다."},
        {word: "acquire", mean: "인수하다", ex: "Our firm plans to acquire a promising startup to expand its market share.", trans: "저희 회사는 시장 점유율을 확대하기 위해 유망한 스타트업을 인수할 계획입니다."},
        {word: "adhere to", mean: "~을 준수하다", ex: "All staff members must adhere to the safety guidelines in the laboratory.", trans: "모든 직원은 실험실 내 안전 지침을 준수해야 합니다."},
        {word: "compliance", mean: "준수", ex: "All employees must work in compliance with the safety standards.", trans: "모든 직원은 안전 기준을 준수하며 근무해야 합니다."},
        {word: "comply with", mean: "~을 준수하다", ex: "The new factory must comply with environmental regulations.", trans: "신설 공장은 환경 규정을 준수해야 합니다."},
        {word: "adversely", mean: "부정적으로", ex: "The technical delay will adversely affect the product launch schedule.", trans: "기술적인 지연은 제품 출시 일정에 부정적으로 영향을 미칠 것입니다."},
        {word: "advocate", mean: "지지하다", ex: "The group is known to advocate for the rights of underprivileged children.", trans: "그 단체는 소외 계층 아동의 권리를 지지하는 것으로 알려져 있습니다."},
        {word: "affordable", mean: "가격이 적당한", ex: "The company aims to provide affordable housing for young professionals.", trans: "회사는 젊은 전문직 종사자들에게 가격이 적당한 주택을 제공하는 것을 목표로 합니다."},
        {word: "aggregate", mean: "합계의", ex: "The aggregate score of the two matches decided the winner of the tournament.", trans: "두 경기의 합계 점수가 토너먼트의 승자를 결정했습니다."},
        {word: "alleviate", mean: "완화하다", ex: "New measures were introduced to alleviate traffic congestion in the city center.", trans: "도심의 교통 정체를 완화하기 위해 새로운 조치들이 도입되었습니다."},
        {word: "mitigate", mean: "완화시키다", ex: "Planting more trees can help mitigate the effects of climate change.", trans: "더 많은 나무를 심는 것은 기후 변화의 영향을 완화시키는 데 도움이 될 수 있습니다."},
        {word: "ambiguous", mean: "모호한", ex: "The instructions were too ambiguous, leading to confusion among the team.", trans: "지침이 너무 모호해서 팀원들 사이에 혼란을 야기했습니다."},
        {word: "ample", mean: "충분한", ex: "There was ample evidence to support the theory proposed by the scientist.", trans: "과학자가 제안한 이론을 뒷받침할 충분한 증거가 있었습니다."},
        {word: "as of late", mean: "최근에", ex: "The stock market has been quite volatile as of late.", trans: "주식 시장은 최근에 상당히 변동성이 컸습니다."},
        {word: "assess", mean: "평가하다", ex: "The committee will assess the impact of the new policy on small businesses.", trans: "위원회는 새로운 정책이 중소기업에 미치는 영향을 평가할 것입니다."},
        {word: "attest to", mean: "~을 증명하다", ex: "His success in the industry attests to his hard work and dedication.", trans: "업계에서의 그의 성공은 그의 노고와 헌신을 증명합니다."},
        {word: "attribute", mean: "~의 덕분으로 돌리다", ex: "The CEO attributed the company's success to the teamwork of all employees.", trans: "CEO는 회사의 성공을 모든 직원의 팀워크 덕분으로 돌렸습니다."},
        {word: "auspicious", mean: "유망한", ex: "The project had an auspicious start with full funding secured early on.", trans: "그 프로젝트는 초기에 충분한 자금을 확보하며 유망하게 시작되었습니다."},
        {word: "prospective", mean: "유망한", ex: "Prospective students are invited to visit the campus during the open house.", trans: "입학 희망 학생들은 오픈 하우스 기간 동안 캠퍼스를 방문하도록 초대됩니다."},
        {word: "be consistent with", mean: "~와 일치하다", ex: "The results of the study are consistent with previous research findings.", trans: "연구 결과는 이전의 연구 결과와 일치합니다."},
        {word: "coincide", mean: "일치하다", ex: "My vacation plans coincide with my sister’s wedding date.", trans: "내 휴가 계획이 여동생의 결혼식 날짜와 일치합니다."},
        {word: "be entitled to", mean: "~할 자격이 있다", ex: "All full-time employees are entitled to three weeks of paid vacation per year.", trans: "모든 정규직 직원은 연간 3주의 유급 휴가를 받을 자격이 있습니다."},
        {word: "eligible", mean: "자격이 있는", ex: "Only small businesses are eligible for the new government grant.", trans: "중소기업만이 새로운 정부 보조금을 받을 자격이 있습니다."},
        {word: "be liable for", mean: "~에 대해 책임이 있다", ex: "The tenant is liable for any damage caused to the property during the lease.", trans: "임차인은 임대 기간 동안 건물에 발생한 모든 손상에 대해 책임이 있습니다."},
        {word: "belated", mean: "뒤늦은", ex: "She sent a belated birthday card to her friend a week after the party.", trans: "그녀는 파티 일주일 후 친구에게 뒤늦은 생일 카드를 보냈습니다."},
        {word: "briefly", mean: "잠시", ex: "The manager briefly explained the changes to the project schedule.", trans: "매니저는 프로젝트 일정 변경 사항을 잠시 설명했습니다."},
        {word: "broaden", mean: "넓히다", ex: "Traveling to different countries helps to broaden one's perspective on the world.", trans: "다른 나라들을 여행하는 것은 세계에 대한 시야를 넓히는 데 도움이 됩니다."},
        {word: "circumvent", mean: "우회하다", ex: "The company tried to circumvent the new tax laws by moving its headquarters.", trans: "회사는 본사를 이전함으로써 새로운 세법을 우회하려 했습니다."},
        {word: "coherent", mean: "일관성 있는", ex: "The speaker presented a coherent argument that convinced the entire audience.", trans: "발표자는 모든 청중을 설득하는 일관성 있는 논거를 제시했습니다."},
        {word: "commence", mean: "시작되다", ex: "The construction of the new office building is set to commence next month.", trans: "새 사무실 건물의 건설이 다음 달에 시작될 예정입니다."},
        {word: "commitment to", mean: "~에 대한 헌신", ex: "The organization has a strong commitment to environmental conservation.", trans: "그 조직은 환경 보존에 대한 강한 헌신을 가지고 있습니다."},
        {word: "dedicate", mean: "헌신하다", ex: "She decided to dedicate her life to helping the underprivileged.", trans: "그녀는 소외 계층을 돕는 데 평생을 헌신하기로 결심했습니다."},
        {word: "confidential", mean: "기밀의", ex: "All patient records are kept strictly confidential within the hospital.", trans: "모든 환자 기록은 병원 내에서 엄격히 기밀로 유지됩니다."},
        {word: "conducive", mean: "도움이 되는", ex: "A quiet environment is conducive to studying for long periods of time.", trans: "조용한 환경은 장시간 공부하는 데 도움이 됩니다."},
        {word: "contingency plan", mean: "비상 대책", ex: "The company has a contingency plan in case the primary supplier fails to deliver.", trans: "회사는 주요 공급업체가 배송에 실패할 경우를 대비한 비상 대책을 가지고 있습니다."},
        {word: "contrary to", mean: "~와는 반대로", ex: "Contrary to expectations, the movie was a huge success at the box office.", trans: "기대와는 반대로, 그 영화는 박스오피스에서 큰 성공을 거두었습니다."},
        {word: "curtail", mean: "축소하다", ex: "The government decided to curtail spending on public infrastructure projects.", trans: "정부는 공공 인프라 프로젝트에 대한 지출을 축소하기로 결정했습니다."},
        {word: "delegate", mean: "위임하다", ex: "A good manager knows how to delegate tasks effectively to their team members.", trans: "좋은 매니저는 팀원들에게 업무를 효과적으로 위임하는 방법을 압니다."},
        {word: "deplete", mean: "고갈시키다", ex: "Years of overfarming have depleted the soil of its essential nutrients.", trans: "수년간의 과도한 농경으로 토양의 필수 영양소가 고갈되었습니다."},
        {word: "designated", mean: "지정된", ex: "Please smoke only in the designated areas outside the building.", trans: "건물 밖의 지정된 구역에서만 흡연해 주시기 바랍니다."},
        {word: "deterrent", mean: "억제책", ex: "Heavy fines serve as a deterrent to illegal parking in the city center.", trans: "무거운 벌금은 도심 내 불법 주차에 대한 억제책 역할을 합니다."},
        {word: "detrimental", mean: "해로운", ex: "Lack of sleep can be detrimental to your physical and mental health.", trans: "수면 부족은 신체적, 정신적 건강에 해로울 수 있습니다."},
        {word: "devote A to B", mean: "A를 B에 쏟다", ex: "He decided to devote all his energy to finishing the project on time.", trans: "그는 프로젝트를 제때 끝내기 위해 모든 에너지를 쏟기로 결심했습니다."},
        {word: "discretion", mean: "재량", ex: "The manager has the discretion to offer discounts to loyal customers.", trans: "매니저는 단골 고객에게 할인을 제공할 재량이 있습니다."},
        {word: "discretionary", mean: "자유 재량의", ex: "The committee has a discretionary fund for unexpected expenses.", trans: "위원회는 예기치 못한 비용을 위한 자유 재량 기금을 가지고 있습니다."},
        {word: "discrepancy", mean: "불일치", ex: "The auditor found a discrepancy between the reported income and the bank records.", trans: "감사인은 보고된 수입과 은행 기록 간의 불일치를 발견했습니다."},
        {word: "draw a conclusion", mean: "결론을 도출하다", ex: "We need more data before we can draw a conclusion from this experiment.", trans: "이 실험에서 결론을 도출하기 전에 더 많은 데이터가 필요합니다."},
        {word: "efficiently", mean: "효율적으로", ex: "The new software will help the team work more efficiently on their daily tasks.", trans: "새 소프트웨어는 팀이 일상 업무를 더 효율적으로 처리하도록 도와줄 것입니다."},
        {word: "eliminate", mean: "제거하다", ex: "The company plans to eliminate all unnecessary costs to improve profitability.", trans: "회사는 수익성을 높이기 위해 모든 불필요한 비용을 제거할 계획입니다."},
        {word: "encompass", mean: "포함하다", ex: "The new training program will encompass all aspects of customer service.", trans: "새로운 교육 프로그램은 고객 서비스의 모든 측면을 포함할 것입니다."},
        {word: "endorse", mean: "승인하다", ex: "The celebrity decided to endorse the new line of eco-friendly products.", trans: "그 유명 인사는 새로운 친환경 제품 라인을 승인(홍보)하기로 결정했습니다."},
        {word: "erroneous", mean: "잘못된", ex: "The news report contained erroneous information about the incident.", trans: "그 뉴스 보고서에는 사건에 대한 잘못된 정보가 포함되어 있었습니다."},
        {word: "excursion", mean: "짧은 여행", ex: "The students went on an excursion to the local science museum.", trans: "학생들은 현지 과학 박물관으로 짧은 여행을 떠났습니다."},
        {word: "exquisite", mean: "정교한", ex: "The jewelry box was decorated with exquisite carvings and precious stones.", trans: "보석 상자는 정교한 조각과 보석으로 장식되어 있었습니다."},
        {word: "facilitate", mean: "용이하게 하다", ex: "The new online system will facilitate communication between teachers and parents.", trans: "새로운 온라인 시스템은 교사와 학부모 사이의 의사소통을 용이하게 할 것입니다."},
        {word: "familiarize with", mean: "~에 익숙해지다", ex: "New employees are required to familiarize themselves with the company’s policies.", trans: "신입 사원들은 회사의 정책에 익숙해져야 합니다."},
        {word: "favorable", mean: "호의적인", ex: "The review of the new restaurant was very favorable, praising its food and service.", trans: "그 새 식당에 대한 리뷰는 음식과 서비스를 칭찬하며 매우 호의적이었습니다."},
        {word: "feasibility", mean: "실연 가능성", ex: "The experts are conducting a study to determine the feasibility of the project.", trans: "전문가들은 프로젝트의 실현 가능성을 결정하기 위한 연구를 진행 중입니다."},
        {word: "fluctuate", mean: "변동하다", ex: "Gas prices often fluctuate depending on the global supply of oil.", trans: "가스 가격은 종종 세계 석유 공급량에 따라 변동합니다."},
        {word: "formidable", mean: "위협적인", ex: "The opposing team is a formidable opponent with a long winning streak.", trans: "상대 팀은 긴 연승 기록을 가진 위협적인 적수입니다."},
        {word: "fragile", mean: "깨지기 쉬운", ex: "Please handle this package with care as it contains fragile glassware.", trans: "이 소포는 깨지기 쉬운 유리 제품을 포함하고 있으니 주의해서 다뤄 주십시오."},
        {word: "galvanize", mean: "활력을 불어넣다", ex: "The leader's speech was designed to galvanize the crowd into action.", trans: "지도자의 연설은 군중이 행동하도록 활력을 불어넣기 위해 고안되었습니다."},
        {word: "genuine", mean: "진짜의", ex: "The antique dealer confirmed that the painting was a genuine masterpiece.", trans: "골동품 상인은 그 그림이 진짜 걸작임을 확인했습니다."},
        {word: "go into effect", mean: "효력을 발생하다", ex: "The new traffic regulations will go into effect starting next Monday.", trans: "새로운 교통 규정은 다음 주 월요일부터 효력을 발생할 것입니다."},

            return {...words[id], originalId: id, questionType: finalType};
        });

        currentIndex = 0; correctCount = 0;
        document.getElementById('test-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = testQueue[currentIndex];
        document.getElementById('question-info').innerText = `문제 ${currentIndex + 1} / ${testQueue.length}`;
        
        if (quizMethod === 'input') {
            document.getElementById('question-text').innerText = (q.questionType === 'toEng') ? q.mean : q.word;
            document.getElementById('question-translation').innerText = "";
            document.getElementById('input-mode').style.display = 'block';
            document.getElementById('choice-mode').style.display = 'none';
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').focus();
        } else {
            // [객관식 모드] 예문 빈칸 문제로 변경
            const blankedSentence = q.ex.replace(new RegExp(q.word, 'gi'), " ( ________ ) ");
            document.getElementById('question-text').innerText = blankedSentence;
            document.getElementById('question-translation').innerText = q.trans;
            
            document.getElementById('input-mode').style.display = 'none';
            document.getElementById('choice-mode').style.display = 'grid';
            generateChoices(q);
        }
    }

    function generateChoices(correctWord) {
        const container = document.getElementById('choice-mode');
        let choices = [correctWord.word];
        while (choices.length < 4) {
            let randomWord = words[Math.floor(Math.random() * words.length)].word;
            if (!choices.includes(randomWord)) choices.push(randomWord);
        }
        choices.sort(() => Math.random() - 0.5);
        container.innerHTML = choices.map(c => 
            `<button class="choice-btn" onclick="checkChoiceAnswer('${c}')">${c}</button>`
        ).join('');
    }

    function checkChoiceAnswer(selected) {
        const q = testQueue[currentIndex];
        if (selected === q.word) {
            alert("정답입니다! ✨");
            correctCount++;
            wrongToEng = wrongToEng.filter(id => id !== q.originalId);
        } else {
            alert(`오답입니다! ❌\n정답: ${q.word}\n${q.mean}`);
            if (!wrongToEng.includes(q.originalId)) wrongToEng.push(q.originalId);
        }
        saveAndNext();
    }

    function checkAnswer() {
        const q = testQueue[currentIndex];
        const input = document.getElementById('answerInput').value.trim().toLowerCase();
        let isCorrect = false;

        if (q.questionType === 'toEng') {
            isCorrect = (input === q.word.toLowerCase());
            if (isCorrect) wrongToEng = wrongToEng.filter(id => id !== q.originalId);
            else if (!wrongToEng.includes(q.originalId)) wrongToEng.push(q.originalId);
        } else {
            const correctMeans = q.mean.split(/[,/]/).map(s => s.trim());
            isCorrect = correctMeans.some(m => input === m || input === m.replace(/\s/g, ''));
            if (isCorrect) wrongToKor = wrongToKor.filter(id => id !== q.originalId);
            else if (!wrongToKor.includes(q.originalId)) wrongToKor.push(q.originalId);
        }

        if (isCorrect) { alert("정답입니다! ✨"); correctCount++; }
        else { alert(`오답입니다! ❌\n정답: ${q.questionType === 'toEng' ? q.word : q.mean}`); }
        saveAndNext();
    }

    function saveAndNext() {
        localStorage.setItem('wrong_voca_eng', JSON.stringify(wrongToEng));
        localStorage.setItem('wrong_voca_kor', JSON.stringify(wrongToKor));
        currentIndex++;
        if (currentIndex < testQueue.length) showQuestion();
        else {
            const score = Math.round((correctCount / testQueue.length) * 100);
            alert(`시험 종료!\n🎯 점수: ${score}점 (${correctCount}/${testQueue.length})`);
            document.getElementById('test-area').style.display = 'none';
            renderList();
        }
    }

    function resetIncorrect() {
        if(confirm("오답 기록을 초기화할까요?")) {
            wrongToEng = []; wrongToKor = [];
            localStorage.setItem('wrong_voca_eng', '[]');
            localStorage.setItem('wrong_voca_kor', '[]');
            renderList();
        }
    }

    renderList();
</script>
</body>
</html>
