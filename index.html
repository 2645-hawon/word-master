let queue = [], curIdx = 0, score = 0, mode = '';

function start(m) {
    mode = m;
    let count = document.getElementById('qCount').value;
    queue = [...data].sort(() => Math.random() - 0.5).slice(0, count);
    curIdx = 0; score = 0;
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('test-view').style.display = 'block';
    show();
}

function show() {
    const q = queue[curIdx];
    document.getElementById('progress-text').innerText = `${curIdx + 1} / ${queue.length}`;
    document.getElementById('score-text').innerText = `맞은 개수: ${score}`;
    
    const optArea = document.getElementById('options-area');
    const inputArea = document.getElementById('input-box');
    
    if (mode === 'ex') {
        document.getElementById('question-text').innerText = q.ex;
        optArea.style.display = 'none';
        inputArea.style.display = 'block';
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').focus();
    } else {
        document.getElementById('question-text').innerText = (mode === 'toEng') ? q.m : (q.w || q.word);
        optArea.style.display = 'grid';
        inputArea.style.display = 'none';
        makeOpts(q);
    }
}

function makeOpts(correct) {
    const area = document.getElementById('options-area');
    area.innerHTML = '';
    
    // 유의어 그룹 찾기 (중복 방지)
    let forbidden = [correct.w || correct.word];
    for (let group of synonyms) {
        if (group.includes(correct.w || correct.word)) {
            forbidden = group; break;
        }
    }

    let pool = data.filter(item => !forbidden.includes(item.w || item.word));
    let distractors = pool.sort(() => Math.random() - 0.5).slice(0, 3);
    let final = [...distractors, correct].sort(() => Math.random() - 0.5);

    final.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = (mode === 'toEng') ? (opt.w || opt.word) : (opt.m || opt.mean);
        btn.onclick = () => check(opt === correct);
        area.appendChild(btn);
    });
}

function check(isCorrect) {
    const q = queue[curIdx];
    if (isCorrect) score++;
    else alert(`❌ 틀렸습니다!\n정답: ${q.w || q.word} (${q.m || q.mean})`);
    next();
}

function checkSub() {
    const input = document.getElementById('answer-input').value.trim().toLowerCase();
    const correct = (queue[curIdx].w || queue[curIdx].word).toLowerCase();
    check(input === correct);
}

function next() {
    curIdx++;
    if (curIdx < queue.length) show();
    else finish();
}

function finish() {
    alert(`🎉 테스트 종료!\n최종 점수: ${score} / ${queue.length}`);
    location.reload();
}
